<!doctype html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta http-equiv="Content-Security-Policy"
content="
default-src 'self';
script-src 'self' https://challenges.cloudflare.com;
style-src 'self' https://fonts.googleapis.com;
font-src https://fonts.gstatic.com;
connect-src https://green-darkness-a19d.kusogakiller.workers.dev;
frame-src https://challenges.cloudflare.com;
">

<title>目安箱</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>


<style>

body{
    margin:0;
    background:#f6f7f9;
    color:#111827;
    font-family:"Inter",sans-serif;
}

.container{
    max-width:820px;
    margin:auto;
    padding:60px 20px;
}


h1{
    margin:0 0 10px;
    font-size:40px;
}


.subtitle{
    color:#6b7280;
    line-height:1.8;
    margin-bottom:30px;
}


.section-title{
    font-size:12px;
    color:#6b7280;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin:18px 0 10px;
}


.card{

    background:white;

    border:1px solid #e5e7eb;

    border-radius:12px;

    padding:18px;

    box-shadow:
    0 6px 20px rgba(0,0,0,.04);

}


input,
textarea{

    width:100%;

    padding:10px 12px;

    font-size:14px;

    border-radius:8px;

    border:1px solid #e5e7eb;

    font-family:inherit;

}


textarea{
    resize:vertical;
}



button{

    padding:10px 14px;

    font-size:14px;

    border-radius:8px;

    border:1px solid #e5e7eb;

    background:#111827;

    color:white;

    cursor:pointer;

    transition:.15s;

}


button:hover:not(:disabled){

    transform:translateY(-1px);

}


button:disabled{

    opacity:.6;

}



.status{

    color:#6b7280;

    font-size:13px;

}



.output{

    background:white;

    border:1px solid #e5e7eb;

    border-radius:12px;

    padding:18px;

    box-shadow:
    0 6px 20px rgba(0,0,0,.04);

    font-family:"JetBrains Mono",monospace;

    white-space:pre-wrap;

}



footer{

    margin-top:28px;

    color:#6b7280;

    font-size:13px;

}


</style>

</head>


<body>


<div class="container">


<h1>
Suggestion Box
</h1>


<div class="subtitle">

大紅茶帝国の意見箱です。<br>

送信内容は安全に通達されます。

</div>


<div class="section-title">
Message
</div>


<form id="form">


<div class="card">


<label>
名前

<input
id="username"
maxlength="16"
autocomplete="username"
required>
</label>


<br>


<label>
タイトル

<input
id="title"
maxlength="100"
required>
</label>


<br>


<label>
内容

<textarea
id="message"
rows="8"
maxlength="1000"
required></textarea>

</label>


</div>



<div class="honeypot">


<input id="website"
autocomplete="off">


<input id="email_check"
autocomplete="off">


<input id="phone_check"
autocomplete="off">


<input id="form_time">


</div>


<br>


<div class="section-title">
Verification
</div>


<div class="card">


<div
class="cf-turnstile"
data-sitekey="0x4AAAAAAD356TVJG6c5Ipvw">
</div>


<br>


<button id="submit">
Send
</button>


<span id="status" class="status">
Ready
</span>


</div>


</form>



<div class="section-title">
Result
</div>


<div class="output" id="result">
No output yet.
</div>



<footer>

Secure suggestion system powered by Cloudflare Workers.
Created by @ねぎら◆BBBBBBBBB.

</footer>



</div>



<script>


const API =
"https://green-darkness-a19d.kusogakiller.workers.dev/submit";


const form =
document.getElementById("form");


const button =
document.getElementById("submit");


const status =
document.getElementById("status");


const result =
document.getElementById("result");


const formTime =
document.getElementById("form_time");


formTime.value =
Date.now();



form.addEventListener(
"submit",
async(e)=>{


e.preventDefault();



if(button.disabled)
return;



button.disabled=true;

status.textContent="Sending...";



try{


const token =
document.querySelector(
"[name='cf-turnstile-response']"
)?.value;



if(!token)
throw new Error(
"Turnstile required"
);



const body={

username:
document.getElementById("username").value.trim(),

title:
document.getElementById("title").value.trim(),

message:
document.getElementById("message").value.trim(),

website:
document.getElementById("website").value,

email_check:
document.getElementById("email_check").value,

phone_check:
document.getElementById("phone_check").value,

form_time:
formTime.value,

turnstileToken:
token

};



const response =
await fetch(
API,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:
JSON.stringify(body)

}
);



let data;


try{

data =
await response.json();

}catch{

data={
error:
"Invalid server response"
};

}



result.textContent =
JSON.stringify(
data,
null,
2
);



status.textContent =
data.success
?
"Done"
:
"Failed";



if(window.turnstile){

turnstile.reset();

}


}catch(error){


result.textContent =
String(error);


status.textContent =
"Error";



}finally{


button.disabled=false;


}


});


</script>


</body>
</html>
